name: cd

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          username: bonitao
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (lazybox)
        id: meta-lazybox
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/bonisoft3/lazybox
            bonitao/lazybox
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker metadata (nubox)
        id: meta-nubox
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/bonisoft3/lazybox
            bonitao/lazybox
          tags: |
            type=semver,pattern={{version}},suffix=-nubox
            type=semver,pattern={{major}}.{{minor}},suffix=-nubox
            type=raw,value=nubox,enable={{is_default_branch}}

      - name: Build and push lazybox
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          target: lazybox
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta-lazybox.outputs.tags }}
          labels: ${{ steps.meta-lazybox.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push nubox
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          target: nubox
          build-args: |
            BASE_IMG=chainguard/wolfi-base@sha256:a5a619c1793039dcf92f02178f37c94bb3d6001403716da59d6092dfe8d9b502
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta-nubox.outputs.tags }}
          labels: ${{ steps.meta-nubox.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: lazybox ${{ github.ref_name }}
